  <style>
    .sub-page { padding: 48px 0 80px; background: #f9f8f5; min-height: calc(100vh - 200px); }
    .sub-page .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
    .page-header { margin-bottom: 40px; display: flex; align-items: center; gap: 16px; }
    .page-header a { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #C8A84B; font-family: 'Noto Sans KR', sans-serif; text-decoration: none; transition: opacity 0.2s; }
    .page-header a:hover { opacity: 0.7; }
    .page-header h1 { font-family: 'Noto Serif KR', serif; font-size: 26px; font-weight: 600; color: #1a1a1a; }
    .page-header .divider { color: #ccc; }

    .products-loading { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; padding: 4rem 0; color: #888; gap: 1rem; }
    .loading-spinner { width: 36px; height: 36px; border: 3px solid #2a2a2a; border-top-color: #C8A84B; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .product-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%); color: #C8A84B; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 2px; text-align: center; padding: 1rem; }

    .card-soldout { opacity: 0.6; }
    .soldout-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; }
    .soldout-overlay span { font-family: 'Cinzel', serif; font-size: 18px; letter-spacing: 4px; color: #fff; border: 1px solid #fff; padding: 6px 14px; opacity: 0.8; }

    .btn-cart-wrap { display: flex; flex-direction: column; align-items: stretch; gap: 5px; }
    .btn-buy { width: 100%; background: #C8A84B; color: #fff; border: none; padding: 10px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: background 0.2s, color 0.2s; letter-spacing: 1px; }
    .btn-buy:hover { background: #F5E090; color: #1a1200; }
    .btn-soldout { width: 100%; background: #2a2a2a; color: #555; border: 1px solid #333; padding: 10px; font-size: 13px; letter-spacing: 2px; cursor: pointer; }

    /* ✅ 수정: flex 구조 유지하면서 cursor: pointer 추가 */
    .product-card { display: flex; flex-direction: column; cursor: pointer; }
  </style>
</head>
<body>
  <div class="top-bar" id="nav-topbar"></div>
  <header id="nav-header"></header>
  <nav id="nav-main"></nav>
  <div id="nav-mobile"></div>

  <section class="sub-page">
    <div class="container">
      <div class="page-header">
        <a href="index.html">← 홈으로</a>
        <span class="divider">/</span>
        <h1>금화 보기</h1>
      </div>
      <div class="product-tabs" style="margin-bottom:28px;">
        <button class="ptab active" data-filter="gold">금화</button>
      </div>
      <div class="products-grid" id="products-grid">
<!-- SSG_GRID_START -->
        <div class="products-loading">
          <div class="loading-spinner"></div>
          <p>상품을 불러오는 중...</p>
        </div>
<!-- SSG_GRID_END -->
      </div>
    </div>
  </section>

  <footer id="site-footer"></footer>

  <!-- 장바구니 사이드바: 사용자 결정으로 제거함. 담기 버튼이 사이트
       어디에도 없어 진입점이 없는 죽은 UI였고, 구매 문의는
       coin-detail.html의 단일 "구매 문의하기"(카카오톡 연결) 버튼으로
       통일됨. (이 페이지에서만 쓰이던 toast 알림 UI도 같이 정리함) -->

  <script type="module" src="auth.js"></script>
  <script src="footer.js"></script>
  <script src="nav.js"></script>
  <script src="products.js"></script>
  <script>
    // ===== URL 쿼리스트링 기반 키워드 필터 =====
    const urlParams = new URLSearchParams(location.search);
    const queryKeyword = urlParams.get('q');

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // 한글 합성어 오매칭 방지: 키워드 앞/뒤에 다른 한글 글자가 바로 붙어있으면
    // 별개 단어(예: '라이언이글'의 '이글')로 보고 제외한다.
    function matchesKeyword(name, keyword) {
      const lowerName = name.toLowerCase();
      const lowerKeyword = keyword.toLowerCase();
      const isHangul = ch => /[\uac00-\ud7a3]/.test(ch);
      let idx = lowerName.indexOf(lowerKeyword);
      while (idx !== -1) {
        const before = idx === 0 ? '' : lowerName[idx - 1];
        const afterIdx = idx + lowerKeyword.length;
        const after = afterIdx >= lowerName.length ? '' : lowerName[afterIdx];
        if (!isHangul(before) && !isHangul(after)) return true;
        idx = lowerName.indexOf(lowerKeyword, idx + 1);
      }
      return false;
    }

    // ===== PRODUCT TABS =====
    document.querySelectorAll('.ptab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const filter = tab.dataset.filter;
        document.querySelectorAll('.product-card').forEach(card => {
          card.style.display = (filter === 'all' || card.dataset.category === filter) ? '' : 'none';
        });
      });
    });

    // ===== 장바구니/TOAST 관련 함수: 장바구니 사이드바 제거에 따라
    // 함께 삭제함 (openCart/closeCart/getCardPrice/removeFromCart/
    // updateCartUI/showToast — 모두 호출하는 곳이 없던 죽은 코드였음)
    // createProductCard / SHEET_ID / fetchProductsFromSheet는
    // products.js(공용 파일)로 이동함. 이 페이지(coins.html)는
    // products.js를 <script src="products.js">로 먼저 로드해서 사용함.

    // 상품명 → slug 변환: IMAGE_MAP의 file 값(products-{slug}.png)에서 slug 추출.
    // 매칭 실패 시 fallback으로 coin-detail.html?name=... 사용.
    function getSlugForProduct(name) {
      const lower = name.toLowerCase();
      for (const entry of IMAGE_MAP) {
        if (entry.keywords.some(k => lower.includes(k))) {
          // 'products-maple-2026.png' → 'maple-2026'
          return entry.file.replace(/^products-/, '').replace(/\.png$/, '');
        }
      }
      return null;
    }

    // coins.html 전용 카드 옵션: 클릭 시 coin-{slug}.html 으로 이동.
    // 슬러그 매칭 실패 시 coin-detail.html?name=... 으로 fallback.
    // 가격 미로딩 시 "로딩중..." 표시, lazy 이미지 적용.
    const COINS_CARD_OPTIONS = {
      linkTemplate: (product) => {
        const slug = getSlugForProduct(product.name);
        return slug ? `coin-${slug}.html` : `coin-detail.html?name=${encodeURIComponent(product.name)}`;
      },
      loadingPriceText: '로딩중...',
      lazyImage: true,
      soldoutBtnText: '상품 보기', // coins.html은 품절 상품도 "상품 보기" 버튼 노출
    };

    let currentKrwPrice = null;
    let productsData = [];

    async function loadProducts() {
      try {
        productsData = await fetchProductsFromSheet({ visibleValues: ['all', 'coins'] });
        renderProducts();
      } catch (e) {
        console.error('상품 목록 로딩 오류:', e);
        document.getElementById('products-grid').innerHTML =
          '<p style="color:#888;text-align:center;padding:2rem;">상품을 불러오는 중 오류가 발생했습니다.</p>';
      }
    }

    function renderProducts() {
      const grid = document.getElementById('products-grid');
      if (!productsData.length) return;

      let sorted = [...productsData].sort((a, b) => {
        const aAvail = a.available === 'TRUE';
        const bAvail = b.available === 'TRUE';
        if (aAvail !== bAvail) return aAvail ? -1 : 1;
        return a.order - b.order;
      });

      let matched = true;
      if (queryKeyword) {
        const filtered = sorted.filter(p => matchesKeyword(p.name, queryKeyword));
        if (filtered.length > 0) {
          sorted = filtered;
        } else {
          matched = false; // 일치하는 상품 없으면 필터 없이 전체 상품 표시
        }
      }

      // 키워드 필터 안내 배너 (있으면 중복 추가 방지를 위해 먼저 제거)
      const existingBanner = document.getElementById('query-filter-banner');
      if (existingBanner) existingBanner.remove();
      if (queryKeyword && matched) {
        const banner = document.createElement('div');
        banner.id = 'query-filter-banner';
        banner.style.cssText = 'grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:13px;color:#666;font-family:"Noto Sans KR",sans-serif;';
        banner.innerHTML = `<span>'${escapeHTML(queryKeyword)}' 검색 결과</span><a href="coins.html" style="color:#C8A84B;text-decoration:none;">전체 상품 보기 ›</a>`;
        grid.parentNode.insertBefore(banner, grid);
      }

      grid.innerHTML = sorted.map(p => createProductCard(p, currentKrwPrice, COINS_CARD_OPTIONS)).join('');

      const activeTab = document.querySelector('.ptab.active');
      if (activeTab) {
        const filter = activeTab.dataset.filter;
        document.querySelectorAll('.product-card').forEach(card => {
          card.style.display = (filter === 'all' || card.dataset.category === filter) ? '' : 'none';
        });
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
          if (entry.isIntersecting) {
            setTimeout(() => {
              entry.target.style.opacity = '1';
              entry.target.style.transform = 'translateY(0)';
            }, i * 80);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0 });

      document.querySelectorAll('.product-card').forEach(el => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(20px)';
        el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        observer.observe(el);
      });
    }

    function updateCardPricesFromSheet(krwPerOz) {
      currentKrwPrice = krwPerOz;
      document.querySelectorAll('.product-card').forEach(card => {
        const premium = parseFloat(card.dataset.premium) || 1.03;
        const price = Math.round(krwPerOz * premium / 1000) * 1000;
        const priceEl = card.querySelector('.product-price');
        if (priceEl) priceEl.textContent = `₩${price.toLocaleString()}`;
      });
    }

    loadProducts();
  </script>
</body>
</html>
