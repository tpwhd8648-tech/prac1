    .sub-page { padding: 48px 0 80px; background: #f9f8f5; min-height: calc(100vh - 200px); }

    .empty-state p { font-size: 15px; line-height: 1.8; color: #bbb; }
    .empty-state .gold-line { display: block; width: 40px; height: 2px; background: linear-gradient(90deg, #C8A84B, #F5E090); margin: 20px auto; border-radius: 2px; }
    .kakao-float { position: fixed; right: 20px; bottom: 80px; width: 54px; height: 54px; background: #FEE500; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2000; box-shadow: 0 0 0 3px #C8A84B, 0 4px 16px rgba(0,0,0,0.25); transition: transform 0.2s, box-shadow 0.2s; }
    .kakao-float:hover { transform: scale(1.1); box-shadow: 0 0 0 3px #F5E090, 0 6px 20px rgba(0,0,0,0.3); }
