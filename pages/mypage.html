  <script type="module" src="../assets/js/auth.js"></script>
  <script src="../assets/js/footer.js"></script>
  <script src="../assets/js/nav.js"></script>
  <script>
    (function () {
      const guestBox = document.getElementById('mypage-guest');
      const mainBox = document.getElementById('mypage-main');
      const emailEl = document.getElementById('mypage-email');
      const avatarEl = document.getElementById('mypage-avatar');
      const loginBtn = document.getElementById('mypage-login-btn');
      const logoutBtn = document.getElementById('mypage-logout-btn');

      function render(user) {
        if (user) {
          guestBox.classList.remove('show');
          mainBox.classList.add('show');
          emailEl.textContent = user.email || '-';
          avatarEl.textContent = (user.email || 'M').charAt(0).toUpperCase();
        } else {
          mainBox.classList.remove('show');
          guestBox.classList.add('show');
        }
      }

      // 헤더 "로그인" 버튼이 이미 만들어져 있다면 그걸 그대로 클릭 (모달 로직 재사용)
      loginBtn.addEventListener('click', function () {
        const headerAuthBtn = document.getElementById('auth-btn');
        if (headerAuthBtn) {
          headerAuthBtn.click();
        }
      });

      logoutBtn.addEventListener('click', async function () {
        if (!window.bullionAuth) return;
        logoutBtn.disabled = true;
        try {
          await window.bullionAuth.signOutUser();
        } catch (e) {
          console.error('로그아웃 오류:', e);
        } finally {
          logoutBtn.disabled = false;
        }
      });

      // 초기 상태 반영 (nav.js/auth.js 로드 타이밍 대비)
      function syncInitial() {
        if (window.bullionAuth) {
          render(window.bullionAuth.currentUser);
        }
      }
      syncInitial();
      setTimeout(syncInitial, 200);

      document.addEventListener('bullion-auth-changed', function (e) {
        render(e.detail && e.detail.user);
      });
    })();
  </script>
