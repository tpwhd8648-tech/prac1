    @media (max-width: 768px) { .product-detail { grid-template-columns: 1fr; gap: 32px; } }

    .gallery { display: flex; flex-direction: column; gap: 12px; }

    /* ── 갤러리 메인: overflow hidden + cursor ── */
    .gallery-main {
      width: 100%;
      aspect-ratio: 1;
      background: #fff;
      overflow: hidden;
      position: relative;
      cursor: crosshair;
      /* 세로 스크롤(pan-y)은 브라우저 네이티브 처리에 맡겨 다른 영역과

      touch-action: pan-y;
    }

    /* ── 메인 이미지: transform-origin 중앙, will-change ── */
    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 20px;
      box-sizing: border-box;
      transform-origin: center center;
      will-change: transform;
      transition: transform 0.3s ease;
      display: block;
    }

    @media (max-width: 768px) { .product-title { font-size: 22px; } }

  <script>
    function buildImageList(imageFile) {
      if (!imageFile) return [];
      const base = imageFile.replace(/\.png$/i, '');
      return [
        { src: `images/${base}.png`,         label: '앞면' },
        { src: `images/${base}-back.png`,     label: '뒷면' },
        { src: `images/${base}-detail1.png`,  label: '상세1' },
        { src: `images/${base}-detail2.png`,  label: '상세2' },
      ];
    }

    let currentProduct = null;
    function updateCardPricesFromSheet(krwPerOz) {
      const priceEl = document.getElementById('detail-price-value');
      if (!priceEl || !currentProduct) return;
      const price = Math.round(krwPerOz * currentProduct.premium / 1000) * 1000;
      priceEl.textContent = `₩${price.toLocaleString()}`;
      priceEl.classList.remove('loading');
    }

    function renderDetail(product) {
      currentProduct = product;
      const { name, brand, available, same_day, description, image } = product;
      const isAvailable = available === 'TRUE' || available === true;
      const isSameDay = same_day === 'TRUE' || same_day === true;
      const images = buildImageList(image);

      const priceHTML = `
        <div class="product-price-value loading" id="detail-price-value">로딩 중...</div>
        <div class="product-price-note">* 금 시세에 따라 변동될 수 있습니다</div>
        ${!isAvailable ? '<div style="margin-top:10px;"><span class="soldout-badge">SOLD OUT</span></div>' : ''}
      `;

      const thumbsHTML = images.map((img, i) => `
        <div class="gallery-thumb ${i === 0 ? 'active' : ''}" onclick="switchImage(${i})" data-index="${i}">
          <img src="${img.src}" alt="${img.label}" loading="lazy"
            onerror="this.parentElement.style.display='none'"
            onload="this.parentElement.style.display='flex'">
        </div>`).join('');

      const mainImgHTML = images.length > 0
        ? `<img id="gallery-main-img" src="${images[0].src}" alt="${name}" onerror="this.style.display='none';document.getElementById('gallery-no-img').style.display='flex'">`
        : '';

      const inquiryBtn = isAvailable
        ? `<a href="https://open.kakao.com/o/sB6Gduni" target="_blank" rel="noopener noreferrer" class="btn-inquiry" id="inquiry-btn">구매 문의하기</a>`
        : `<div style="text-align:center;padding:12px 0;"><span class="soldout-badge">현재 품절된 상품입니다</span></div>`;

      const coinExtra = (typeof getCoinDescription === 'function') ? getCoinDescription(name) : null;
      const detailText = coinExtra ? coinExtra.detail.trim() : '';
      const specs = coinExtra ? coinExtra.specs : null;

      // JSON-LD Product 구조화 데이터 — 고정 스펙 기반으로 head에 삽입
      // (가격은 실시간 연동이라 제외, 네이버/구글 크롤러가 읽는 용도)
      const existingLd = document.getElementById('ld-product');
      if (existingLd) existingLd.remove();
      if (specs) {
        const imageFile = image || '';
        const baseImg = imageFile.replace(/\.png$/i, '');
        const ldData = {
          '@context': 'https://schema.org',
          '@type': 'Product',
          name: name,
          description: (detailText || description || '').replace(/\n/g, ' ').substring(0, 300),
          image: `https://tpwhd8648-tech.github.io/images/${baseImg}.png`,
          brand: { '@type': 'Brand', name: brand || 'MIDAS BULLION' },
          offers: {
            '@type': 'Offer',
            url: `https://tpwhd8648-tech.github.io/coin-detail.html?name=${encodeURIComponent(name)}`,
            priceCurrency: 'KRW',
            availability: isAvailable ? 'https://schema.org/InStock' : 'https://schema.org/OutOfStock',
            seller: { '@type': 'Organization', name: 'MIDAS BULLION' }
          },
          additionalProperty: [
            { '@type': 'PropertyValue', name: '순도', value: specs.purity },
            { '@type': 'PropertyValue', name: '중량', value: specs.weight },
            { '@type': 'PropertyValue', name: '발행처', value: specs.mint },
            { '@type': 'PropertyValue', name: '발행국', value: specs.country },
            ...(specs.diameter ? [{ '@type': 'PropertyValue', name: '직경', value: specs.diameter }] : []),
          ]
        };
        const ldScript = document.createElement('script');
        ldScript.type = 'application/ld+json';
        ldScript.id = 'ld-product';
        ldScript.textContent = JSON.stringify(ldData);
        document.head.appendChild(ldScript);
      }

      const descTabHTML = `
        ${description ? `<div class="tab-short-desc">${description}</div>` : ''}
        ${detailText
          ? `<div class="tab-detail-desc">${detailText}</div>`
          : (!description ? `<p class="tab-empty-note">상세 설명이 준비 중입니다.</p>` : '')}
      `;

      const infoTabHTML = specs ? `
        <table class="spec-table">
          <tr><th>연도</th><td>${specs.year || '확인 중'}</td></tr>
          <tr><th>발행처</th><td>${specs.mint}</td></tr>
          <tr><th>발행국</th><td>${specs.country}</td></tr>
          <tr><th>순도</th><td>${specs.purity}</td></tr>
          <tr><th>중량</th><td>${specs.weight}</td></tr>
          <tr><th>직경</th><td>${specs.diameter || '확인 중'}</td></tr>
          ${specs.thickness ? `<tr><th>두께</th><td>${specs.thickness}</td></tr>` : ''}
          <tr><th>상태</th><td>${specs.condition || '미사용 (Brilliant Uncirculated)'}</td></tr>
        </table>

      ` : `<p class="tab-empty-note">상품정보가 준비 중입니다. 구매 문의를 통해 정확한 스펙을 안내받으실 수 있습니다.</p>`;

      const guideTabHTML = `
        <p>본 상품의 판매가는 실시간 국제 금 시세와 환율을 반영하여 매일 변동됩니다.</p>
        <p>구매를 원하시면 하단의 [구매 문의하기] 버튼을 통해 카카오톡 채널로 문의해 주세요.
        담당자가 결제 방법, 배송(또는 매장 수령), 정품 보증서 발급 등을 안내해 드립니다.</p>
        <p>상품 이미지의 IN STOCK / PRE SALE 뱃지로 당일 수령 가능 여부를 확인할 수 있습니다.</p>
        <p>교환·환불 등 세부 정책은 문의 시 담당자를 통해 정확히 안내받으실 수 있습니다.</p>
      `;

      const detailTabsHTML = `
        <div class="detail-tabs-section">
          <div class="detail-tabs">
            <button class="dtab active" data-tab="desc" onclick="switchDetailTab('desc')">상품설명</button>
            <button class="dtab" data-tab="info" onclick="switchDetailTab('info')">상품정보</button>
            <button class="dtab" data-tab="guide" onclick="switchDetailTab('guide')">구매안내</button>
          </div>
          <div class="detail-tab-panel active" data-panel="desc">${descTabHTML}</div>
          <div class="detail-tab-panel" data-panel="info">${infoTabHTML}</div>
          <div class="detail-tab-panel" data-panel="guide">${guideTabHTML}</div>
        </div>
      `;

      document.getElementById('detail-content').innerHTML = `
        <div class="product-detail">
          <div class="gallery">
            <div class="gallery-main">
              ${mainImgHTML}
              ${isAvailable && isSameDay ? '<span class="badge-instock">IN STOCK</span>' : ''}
              ${isAvailable && !isSameDay ? '<span class="badge-presale">PRE SALE</span>' : ''}
              <div id="gallery-no-img" class="gallery-no-image" style="display:none">${name.substring(0,6)}</div>
            </div>
            <div class="gallery-thumbs" id="gallery-thumbs">
              ${thumbsHTML}
            </div>
          </div>
          <div class="product-info-panel">
            <div class="product-brand-label">${brand}</div>
            <h1 class="product-title">${name}</h1>
            <div class="product-price-area">
              <div class="product-price-label">판매가</div>
              ${priceHTML}
            </div>
            <div>
              ${inquiryBtn}
              <a href="coins.html" class="btn-back-coins">← 목록으로 돌아가기</a>
            </div>
          </div>
        </div>
        ${detailTabsHTML}`;
    }

    function switchDetailTab(tabName) {
      document.querySelectorAll('.dtab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
      document.querySelectorAll('.detail-tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === tabName));
    }

    function switchImage(index) {
      const thumbs = document.querySelectorAll('.gallery-thumb');
      const mainImg = document.getElementById('gallery-main-img');
      const noImg = document.getElementById('gallery-no-img');
      if (!mainImg) return;

      thumbs.forEach((t, i) => t.classList.toggle('active', i === index));
      const src = thumbs[index]?.querySelector('img')?.src;
      if (src) {
        mainImg.style.transition = 'opacity 0.15s ease, transform 0.3s ease';
        mainImg.style.opacity = '0';
        setTimeout(() => {
          mainImg.src = src;
          mainImg.style.display = '';
          if (noImg) noImg.style.display = 'none';
          mainImg.style.opacity = '1';
          // 썸네일 전환 시 줌 초기화
          mainImg.style.transform = 'scale(1) translate(0,0)';
        }, 150);
      }
    }

    // ===== 이미지 줌 (PC hover + 모바일 터치) =====
    function initMagnifier() {
      const galleryMain = document.querySelector('.gallery-main');
      if (!galleryMain) return;

      const zoom = 2.5;
      let cachedRect = null;

      function getPos(e, rect) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let x = (clientX - rect.left) / rect.width;
        let y = (clientY - rect.top) / rect.height;
        x = Math.max(0, Math.min(1, x));
        y = Math.max(0, Math.min(1, y));
        return { x, y };
      }

      function applyZoom(x, y) {
        const img = document.getElementById('gallery-main-img');
        if (!img || img.style.display === 'none') return;
        const tx = (0.5 - x) * (zoom - 1) * 100;
        const ty = (0.5 - y) * (zoom - 1) * 100;
        img.style.transition = 'none';
        img.style.transform = `scale(${zoom}) translate(${tx}%, ${ty}%)`;
      }

      function resetZoom() {
        const img = document.getElementById('gallery-main-img');
        if (!img) return;
        img.style.transition = 'transform 0.3s ease';
        img.style.transform = 'scale(1) translate(0,0)';
      }

      // ── PC: hover ──
      galleryMain.addEventListener('mouseenter', (e) => {
        cachedRect = galleryMain.getBoundingClientRect();
        const { x, y } = getPos(e, cachedRect);
        applyZoom(x, y);
      });

      galleryMain.addEventListener('mousemove', (e) => {
        const { x, y } = getPos(e, cachedRect);
        applyZoom(x, y);
      });

      galleryMain.addEventListener('mouseleave', () => {
        cachedRect = null;
        resetZoom();
      });

      // ── 모바일: touch ──
      // 판단 기준은 "방향 + 시간":
      // - 수직 이동이 수평 이동보다 뚜렷이 크면 → 스와이프(스크롤): 이 경우
      //   preventDefault를 호출하지 않아 .gallery-main의 touch-action: pan-y에
      //   따라 브라우저가 세로 스크롤을 네이티브로(부드럽게) 처리하게 둔다.
      //   JS로 직접 scrollBy를 호출하면 다른 영역보다 스크롤이 끊겨 보이므로
      //   여기서는 모드만 'scroll'로 표시하고 더 이상 손대지 않는다.
      // - 손가락이 거의 안 움직이고 일정 시간(HOLD_MS) 이상 눌려 있으면 → 돋보기:
      //   이 경우에만 preventDefault로 스크롤을 막고 돋보기를 적용한다.
      // 한 번 모드가 정해지면 그 터치가 끝날 때까지 유지한다.
      const DIRECTION_THRESHOLD = 10; // px, 방향 판단을 시작할 최소 이동 거리
      const HOLD_MS = 150; // ms, 이 시간 동안 거의 안 움직이면 돋보기로 확정
      let touchStartX = 0;
      let touchStartY = 0;
      let mode = 'pending'; // 'pending' | 'zoom' | 'scroll'
      let holdTimer = null;

      function clearHoldTimer() {
        if (holdTimer) {
          clearTimeout(holdTimer);
          holdTimer = null;
        }
      }

      galleryMain.addEventListener('touchstart', (e) => {
        cachedRect = galleryMain.getBoundingClientRect();
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        mode = 'pending';

        clearHoldTimer();
        holdTimer = setTimeout(() => {
          // HOLD_MS 동안 'pending'을 유지했다면(=거의 안 움직였다면) 돋보기로 확정
          if (mode === 'pending') {
            mode = 'zoom';
            // 시작 시점 좌표 기준으로 즉시 한 번 적용 (그대로 누르고만 있어도 반응하도록)
            cachedRect = galleryMain.getBoundingClientRect();
            const { x, y } = getPos(
              { touches: [{ clientX: touchStartX, clientY: touchStartY }] },
              cachedRect
            );
            applyZoom(x, y);
          }
        }, HOLD_MS);
      }, { passive: false });

      galleryMain.addEventListener('touchmove', (e) => {
        const currentX = e.touches[0].clientX;
        const currentY = e.touches[0].clientY;

        if (mode === 'scroll') {
          // 브라우저 네이티브 스크롤에 맡김 (preventDefault 호출 안 함)
          return;
        }

        if (mode === 'zoom') {
          // 돋보기 모드 확정 상태 → 매번 위치를 다시 계산해 위치 어긋남 방지
          e.preventDefault();
          cachedRect = galleryMain.getBoundingClientRect();
          const { x, y } = getPos(e, cachedRect);
          applyZoom(x, y);
          return;
        }

        // mode === 'pending': 아직 방향 미확정
        const dx = currentX - touchStartX;
        const dy = currentY - touchStartY;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > DIRECTION_THRESHOLD) {
          clearHoldTimer();
          // 수직 이동이 수평 이동보다 뚜렷이 크면 스와이프, 아니면(대각선 포함) 돋보기로 판단
          if (Math.abs(dy) > Math.abs(dx) * 1.2) {
            mode = 'scroll';
            // 여기서부터는 브라우저 네이티브 스크롤에 맡김 (preventDefault 안 함)
          } else {
            mode = 'zoom';
            e.preventDefault();
            cachedRect = galleryMain.getBoundingClientRect();
            const { x, y } = getPos(e, cachedRect);
            applyZoom(x, y);
          }
        }
        // distance가 아직 작으면 아무것도 안 하고 HOLD_MS 타이머가 결정하게 둔다
      }, { passive: false });

      galleryMain.addEventListener('touchend', () => {
        clearHoldTimer();
        cachedRect = null;
        mode = 'pending';
        resetZoom();
      });

      galleryMain.addEventListener('touchcancel', () => {
        clearHoldTimer();
        cachedRect = null;
        mode = 'pending';
        resetZoom();
      });

    }

    async function loadProduct(targetName) {
      try {
        // 시트 fetch/파싱은 products.js의 fetchProductsFromSheet()를 그대로 재사용한다.
        // (이전에는 이 파일 안에 동일한 로직을 따로 작성해 중복 유지하고 있었음 —
        //  컬럼 추가/변경 시 한쪽만 고치는 사고를 막기 위해 통합함.)
        // 상세페이지는 목록 노출 여부(visible)와 무관하게 상품을 찾아야 하므로
        // includeAll: true로 필터를 건너뛴다.
        const products = await fetchProductsFromSheet({ includeAll: true });
        const product = products.find(p => p.name === targetName);

        if (!product) {
          document.getElementById('detail-content').innerHTML =
            `<div class="error-msg"><p>상품을 찾을 수 없습니다.</p><a href="coins.html" style="color:#C8A84B;">← 목록으로 돌아가기</a></div>`;
          return;
        }

        document.title = `MIDAS BULLION | ${product.name}`;
        const breadcrumb = document.getElementById('breadcrumb-name');
        if (breadcrumb) breadcrumb.textContent = product.name;

        renderDetail(product);
        setTimeout(initMagnifier, 100);

        const tbGold = document.getElementById('tb-gold');
        const tbRate = document.getElementById('tb-rate');
        if (tbGold && tbRate) {
          const goldText = tbGold.textContent.replace('$', '').trim();
          const rateText = tbRate.textContent.replace('원', '').replace(/,/g, '').trim();
          const gold = parseFloat(goldText);
          const rate = parseFloat(rateText);
          if (gold > 0 && rate > 0) updateCardPricesFromSheet(gold * rate);
        }

      } catch (e) {
        console.error('상품 로딩 오류:', e);
        document.getElementById('detail-content').innerHTML =
          `<div class="error-msg"><p>상품 정보를 불러오는 중 오류가 발생했습니다.</p><a href="coins.html" style="color:#C8A84B;">← 목록으로 돌아가기</a></div>`;
      }
    }

    const params = new URLSearchParams(window.location.search);
    const productName = params.get('name');

    if (!productName) {
      document.getElementById('detail-content').innerHTML =
        `<div class="error-msg"><p>상품 정보가 없습니다.</p><a href="coins.html" style="color:#C8A84B;">← 목록으로 돌아가기</a></div>`;
    } else {
      loadProduct(decodeURIComponent(productName));
    }
  </script>
