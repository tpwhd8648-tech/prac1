  <style>
    .price-page { padding: 48px 0 80px; background: #f9f8f5; min-height: calc(100vh - 200px); }
    .price-page .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
    .page-header { margin-bottom: 32px; display: flex; align-items: center; gap: 16px; }
    .page-header a { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #C8A84B; font-family: 'Noto Sans KR', sans-serif; text-decoration: none; transition: opacity 0.2s; }
    .page-header a:hover { opacity: 0.7; }
    .page-header h1 { font-family: 'Noto Serif KR', serif; font-size: 26px; font-weight: 600; color: #1a1a1a; }
    .page-header .divider { color: #ccc; }
    .chart-tabs { display: flex; gap: 0; border-bottom: 2px solid #e0e0e0; margin-bottom: 24px; }
    .chart-tab { background: none; border: none; padding: 10px 24px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; color: #666; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .chart-tab.active, .chart-tab:hover { color: #C8A84B; border-bottom-color: #C8A84B; font-weight: 600; }
    .chart-wrap { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; overflow: hidden; margin-bottom: 32px; }
    .chart-wrap iframe { display: block; width: 100%; height: 600px; border: none; }
    .price-info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .price-info-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 20px; }
    .price-info-card .label { font-size: 12px; color: #888; letter-spacing: 1px; margin-bottom: 8px; font-family: 'Noto Sans KR', sans-serif; }
    .price-info-card .value { font-size: 22px; font-weight: 700; color: #C8A84B; font-family: 'Cinzel', serif; min-height: 32px; }
    .price-info-card .sub { font-size: 12px; color: #aaa; margin-top: 4px; }
    .notice-box { background: #fff9ee; border-left: 3px solid #C8A84B; padding: 14px 18px; font-size: 13px; color: #666; line-height: 1.7; font-family: 'Noto Sans KR', sans-serif; }

    .more-indicators-wrap { margin-top: 32px; }
    .indicator-toggle-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; background: #fff; border: 1px solid #e0e0e0; border-radius: 4px;
      padding: 14px; font-size: 14px; font-weight: 600; color: #444;
      font-family: 'Noto Serif KR', serif; letter-spacing: 0.5px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .indicator-toggle-btn:hover { border-color: #C8A84B; color: #C8A84B; }
    .indicator-toggle-btn svg { transition: transform 0.2s; }
    .indicator-toggle-btn.open svg { transform: rotate(180deg); }
    .more-indicators-panel { display: none; margin-top: 20px; }
    .more-indicators-panel.open { display: block; }
  </style>
</head>
<body>
  <div class="top-bar" id="nav-topbar"></div>
  <header id="nav-header"></header>
  <nav id="nav-main"></nav>
  <div id="nav-mobile"></div>

  <section class="price-page">
    <div class="container">
      <div class="page-header">
        <a href="index.html">← 홈으로</a>
        <span class="divider">/</span>
        <h1>금 시세</h1>
      </div>
      <div class="price-info-grid">
        <div class="price-info-card">
          <div class="label">GOLD</div>
          <div class="value" id="gold-val">
            <span class="shimmer-card-line shimmer-card-lg"></span>
          </div>
          <div class="sub">USD / Troy oz</div>
        </div>
        <div class="price-info-card">
          <div class="label">SILVER</div>
          <div class="value" id="silver-val">
            <span class="shimmer-card-line shimmer-card-lg"></span>
          </div>
          <div class="sub">USD / Troy oz</div>
        </div>
        <div class="price-info-card">
          <div class="label">환율 (USD/KRW)</div>
          <div class="value" id="rate-val">
            <span class="shimmer-card-line shimmer-card-lg"></span>
          </div>
          <div class="sub">실시간 반영</div>
        </div>
      </div>
      <div class="chart-tabs">
        <button class="chart-tab active" onclick="switchChart('gold', this)">금 (XAUUSD)</button>
        <button class="chart-tab" onclick="switchChart('silver', this)">은 (XAGUSD)</button>
        <button class="chart-tab" onclick="switchChart('platinum', this)">백금 (XPTUSD)</button>
      </div>
      <div class="chart-wrap">
        <div id="tv-chart-container" style="height:600px;">
          <div class="tradingview-widget-container" style="height:100%;">
            <div id="tradingview_chart" style="height:100%;"></div>
          </div>
        </div>
      </div>

      <div class="more-indicators-wrap">
        <button class="indicator-toggle-btn" id="indicator-toggle-btn" onclick="toggleMoreIndicators()" type="button">
          주요지표 더보기
          <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="more-indicators-panel" id="more-indicators-panel">
          <div class="chart-tabs">
            <button class="chart-tab active" onclick="switchExtraChart('wti', this)">원유 (WTI)</button>
            <button class="chart-tab" onclick="switchExtraChart('btc', this)">비트코인 (BTC)</button>
            <button class="chart-tab" onclick="switchExtraChart('fx', this)">환율 (USD/KRW)</button>
          </div>
          <div class="chart-wrap">
            <div id="tv-chart-extra-container" style="height:600px;">
              <div class="tradingview-widget-container" style="height:100%;">
                <div id="tradingview_chart_extra" style="height:100%;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="notice-box">
        ※ 시세는 TradingView 실시간 데이터를 기반으로 표시됩니다. 실제 거래 가격은 프리미엄 및 환율에 따라 다를 수 있습니다.<br>
        정확한 매입·매도 가격은 MIDAS BULLION 고객센터로 문의해 주세요.
      </div>
    </div>
  </section>

  <footer id="site-footer"></footer>

  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    function loadChart(symbol) {
      var container = document.getElementById('tradingview_chart');
      container.innerHTML = '';
      new TradingView.widget({
        autosize: true, symbol: symbol, interval: "D", timezone: "Asia/Seoul",
        theme: "light", style: "1", locale: "kr", toolbar_bg: "#f1f3f6",
        enable_publishing: false, hide_top_toolbar: false, hide_legend: false,
        save_image: false, container_id: "tradingview_chart"
      });
    }
    function switchChart(type, btn) {
      btn.closest('.chart-tabs').querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      const symbols = { gold: 'XAUUSD', silver: 'XAGUSD', platinum: 'XPTUSD' };
      loadChart(symbols[type]);
    }
    loadChart('XAUUSD');

    /* ===== 주요지표 더보기 (원유 WTI / 비트코인) ===== */
    let extraChartLoaded = false;
    function loadExtraChart(symbol) {
      var container = document.getElementById('tradingview_chart_extra');
      container.innerHTML = '';
      new TradingView.widget({
        autosize: true, symbol: symbol, interval: "D", timezone: "Asia/Seoul",
        theme: "light", style: "1", locale: "kr", toolbar_bg: "#f1f3f6",
        enable_publishing: false, hide_top_toolbar: false, hide_legend: false,
        save_image: false, container_id: "tradingview_chart_extra"
      });
    }
    function switchExtraChart(type, btn) {
      btn.closest('.chart-tabs').querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      const symbols = { wti: 'TVC:USOIL', btc: 'BITSTAMP:BTCUSD', fx: 'FX_IDC:USDKRW' };
      loadExtraChart(symbols[type]);
    }
    function toggleMoreIndicators() {
      const panel = document.getElementById('more-indicators-panel');
      const btn = document.getElementById('indicator-toggle-btn');
      const isOpen = panel.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
      if (isOpen && !extraChartLoaded) {
        loadExtraChart('TVC:USOIL');
        extraChartLoaded = true;
      }
    }
  </script>
  <script type="module" src="auth.js"></script>
  <script src="footer.js"></script>
  <script src="nav.js"></script>
</body>
